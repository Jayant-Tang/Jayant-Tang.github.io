#---------------------------
# Hexo Theme Fluid - 自定义配置
#---------------------------

# 全局
favicon: https://jayant-blog-imgs.oss-cn-hangzhou.aliyuncs.com/gh-hexo/favicon.webp
apple_touch_icon: https://jayant-blog-imgs.oss-cn-hangzhou.aliyuncs.com/gh-hexo/head.png
tab_title_separator: " - "
force_https: false

# 代码块
code:
  copy_btn: true
  language:
    enable: true
    default: "TEXT"
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: "github gist"
      style_dark: "dark"

# 趣味功能
fun_features:
  typing:
    enable: false
    typeSpeed: 70
    cursorChar: "|"
    loop: false
    scope: []
  anchorjs:
    enable: true
    element: h1,h2,h3,h4,h5,h6
    placement: left
    visible: hover
    icon: ""
  progressbar:
    enable: true
    height_px: 3
    color: "#29d"
    options: { showSpinner: false, trickleSpeed: 100 }

# 暗色模式
dark_mode:
  enable: true
  default: auto

# 主题颜色
color:
  body_bg_color: "#eee"
  body_bg_color_dark: "#181c27"
  navbar_bg_color: "#2f4154"
  navbar_bg_color_dark: "#1f3144"
  navbar_text_color: "#fff"
  navbar_text_color_dark: "#d0d0d0"
  subtitle_color: "#fff"
  subtitle_color_dark: "#d0d0d0"
  text_color: "#3c4858"
  text_color_dark: "#c4c6c9"
  sec_text_color: "#718096"
  sec_text_color_dark: "#a7a9ad"
  board_color: "#fff"
  board_color_dark: "#252d38"
  post_text_color: "#2c3e50"
  post_text_color_dark: "#c4c6c9"
  post_heading_color: "#1a202c"
  post_heading_color_dark: "#c4c6c9"
  post_link_color: "#0366d6"
  post_link_color_dark: "#1589e9"
  link_hover_color: "#30a9de"
  link_hover_color_dark: "#30a9de"
  link_hover_bg_color: "#f8f9fa"
  link_hover_bg_color_dark: "#364151"
  line_color: "#eaecef"
  line_color_dark: "#435266"
  scrollbar_color: "#c4c6c9"
  scrollbar_color_dark: "#687582"
  scrollbar_hover_color: "#a6a6a6"
  scrollbar_hover_color_dark: "#9da8b3"
  button_bg_color: "transparent"
  button_bg_color_dark: "transparent"
  button_hover_bg_color: "#f2f3f5"
  button_hover_bg_color_dark: "#46647e"

# 字体
font:
  font_size: 16px
  letter_spacing: 0.02em
  code_font_size: 85%

custom_css: /css/custom.css

# 懒加载
lazyload:
  enable: true
  loading_img: https://jayant-blog-imgs.oss-cn-hangzhou.aliyuncs.com/gh-hexo/loading.gif
  onlypost: false
  offset_factor: 2

#---------------------------
# 页头 / 导航栏
#---------------------------
navbar:
  blog_title: "Jayant's Blog"
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - {
        key: "category",
        icon: "iconfont icon-category-fill",
        submenu: [
          { key: "全部", link: "/categories/", icon: "iconfont icon-category-fill" },
          { key: "Nordic", link: "/categories/Nordic/" },
          { key: "Zephyr", link: "/categories/Zephyr/" },
          { key: "Matter", link: "/categories/Matter/" },
          { key: "WiFi", link: "/categories/WiFi/" },
          { key: "Linux", link: "/categories/Linux/" },
          { key: "AI", link: "/categories/AI/" },
          { key: "博客", link: "/categories/%E5%8D%9A%E5%AE%A2/" }
        ]
    }
    - { key: "tag", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill" }
    - { key: "links", link: "/link/", icon: "iconfont icon-link-fill" }

# 搜索
search:
  enable: true
  path: /local-search.xml
  generate_path: /local-search.xml
  field: post
  content: true

# 首屏 Banner
banner:
  random_img: false
  parallax: true
  width_height_ratio: 1.0

scroll_down_arrow:
  enable: true
  banner_height_limit: 80
  scroll_after_turning_page: true

scroll_top_arrow:
  enable: true

open_graph:
  enable: true
  twitter_card: summary_large_image

#---------------------------
# 页脚
#---------------------------
footer:
  content: '
    <a href="https://hexo.io" target="_blank" rel="nofollow noopener"><span>Hexo</span></a>
    <i class="iconfont icon-love"></i>
    <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener"><span>Fluid</span></a>
  '
  statistics:
    enable: false
  beian:
    enable: false

#---------------------------
# 首页
#---------------------------
index:
  banner_img: https://jayant-blog-imgs.oss-cn-hangzhou.aliyuncs.com/gh-hexo/banner.webp
  banner_img_height: 70
  banner_mask_alpha: 0.3
  slogan:
    enable: true
    text: "Jayant's Blog"
  auto_excerpt:
    enable: true
  post_url_target: _self
  post_meta:
    date: true
    category: true
    tag: true
  post_sticky:
    enable: true
    icon: "iconfont icon-top"

#---------------------------
# 文章页
#---------------------------
post:
  banner_img: https://jayant-blog-imgs.oss-cn-hangzhou.aliyuncs.com/gh-hexo/banner.webp
  banner_img_height: 60
  banner_mask_alpha: 0.3
  default_index_img:
  meta:
    author:
      enable: true
    date:
      enable: true
      format: "LL"
    wordcount:
      enable: true
    min2read:
      enable: true
      awl: 2
      wpm: 60
    views:
      enable: false
  updated:
    enable: false
  category_bar:
    enable: true
  toc:
    enable: true
    expand_all: false
    placement: right
    headingSelector: "h1,h2,h3,h4,h5,h6"
    collapseDepth: 2
  copyright:
    enable: true
    license: 'BY'
    author:
      enable: true
    post_date:
      enable: true
      format: "LL"
    update_date:
      enable: false
      format: "LL"
  prev_next:
    enable: true
  image_caption:
    enable: false
  image_zoom:
    enable: true
  footnote:
    enable: true
    header: ''
  math:
    enable: true
    specific: true
    engine: katex

  mermaid:
    enable: true
    specific: false
  comments:
    enable: true
    type: giscus

# 左侧文章侧边栏
left_sidebar:
  category_nav:
    enable: true
    title: "分类导航"
    category_title: "分类"
    tag_title: "标签"
  notice:
    enable: true
    title: "公告"
    avatar_url: https://github.com/Jayant-Tang.png
    avatar_link: https://github.com/Jayant-Tang
    username: "Jayant-Tang"
    text: "欢迎在评论区反馈"
  tools:
    enable: true
    title: "实用工具"
    items:
      - name: "nRF54L PinPlanner"
        link: https://pinplanner.app/
        description: "nRF54L引脚规划工具"
      - name: "Onlie Power Profiler"
        link: "https://devzone.nordicsemi.com/power/w/opp"
        description: "在线功耗模拟器"
      - name: "Nordic DevAcademy"
        link: "https://academy.nordicsemi.com/"
        description: "Nordic官方课程"

#---------------------------
# 评论插件 - Gitalk
#---------------------------
gitalk:
  clientID:
  clientSecret:
  repo:
  owner:
  admin: ['name']
  language: zh-CN
  labels: ['Gitalk']
  perPage: 10
  distractionFreeMode: false
  createIssueManually: true

#---------------------------
# 评论插件 - Giscus
#---------------------------
giscus:
  repo: Jayant-Tang/Jayant-Tang.github.io
  repo-id: R_kgDOTO0_vA
  category: Comments
  category-id: DIC_kwDOTO0_vM4DAmDt
  theme-light: light
  theme-dark: dark
  mapping: title
  strict: 1
  reactions-enabled: 1
  emit-metadata: 0
  input-position: top
  lang: zh-CN

#---------------------------
# 归档页
#---------------------------
archive:
  banner_img: ""
  banner_img_height: 60
  banner_mask_alpha: 0.3

#---------------------------
# 分类页
#---------------------------
category:
  enable: true
  banner_img: ""
  banner_img_height: 60
  banner_mask_alpha: 0.3
  order_by: "-length"
  collapse_depth: 0
  post_order_by: "-date"
  post_limit: 10

#---------------------------
# 标签页
#---------------------------
tag:
  enable: true
  banner_img: ""
  banner_img_height: 70
  banner_mask_alpha: 0.3
  tagcloud:
    min_font: 15
    max_font: 30
    unit: px
    start_color: "#BBBBEE"
    end_color: "#337ab7"

#---------------------------
# 关于页
#---------------------------
about:
  enable: true
  banner_img: ""
  banner_img_height: 60
  banner_mask_alpha: 0.3
  avatar: https://github.com/Jayant-Tang.png
  name: "Jayant Tang"
  intro: "FAE | Nordic Semiconductor"
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/Jayant-Tang", tip: "GitHub" }
    - { class: "iconfont icon-mail-fill", link: "mailto:jayant97@foxmail.com", tip: "Email" }

#---------------------------
# 友链页
#---------------------------
links:
  enable: true
  banner_img: ""
  banner_img_height: 60
  banner_mask_alpha: 0.3
  items:
    - {
      title: 'Jayant97 - cnblogs',
      intro: '国内博客园镜像',
      link: 'https://www.cnblogs.com/jayant97',
      avatar: 'https://github.com/Jayant-Tang.png'
    }
    - {
      title: 'iini',
      intro: 'BLE 和 nRF5 SDK 技术详解',
      link: 'https://www.cnblogs.com/iini'
    }
  onerror_avatar: /img/avatar.png

#---------------------------
# 404页
#---------------------------
page404:
  enable: true
  banner_img: ""
  banner_img_height: 60
  banner_mask_alpha: 0.3
  redirect_delay: 5000
